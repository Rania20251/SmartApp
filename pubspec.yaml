name: smart_clinic_app

description: "A new Flutter project."

publish_to: 'none'

version: 1.0.11+12

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.1
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  file_picker: ^8.1.2
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  url_launcher: ^6.3.2
  intl: ^0.20.2
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#5B2EFF"
  adaptive_icon_foreground: "assets/images/app_icon.png"